{% extends "admin_base.html" %}

{% block title %}إضافة مخزن{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-plus me-2"></i>إضافة مخزن جديد</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">اسم المخزن</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="مثال: بونص فارما">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">الوصف</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="وصف مختصر للمخزن أو الفرع"></textarea>
                    </div>
                    <div class="alert alert-info">
                        بعد إضافة المخزن يمكنك تحديد ما يظهر لأدمن المخزن من صفحة الصلاحيات.
                    </div>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-2"></i>حفظ
                        </button>
                        <a href="{{ url_for('manage_warehouses') }}" class="btn btn-secondary">رجوع</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
