{% if current_user.is_authenticated and session.get('user_type') == 'company' %}
<script>
    (function () {
        function reportClientContext() {
            var standalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
            var displayMode = standalone ? 'standalone' : 'browser';
            try {
                fetch('/client-context', {
                    method: 'POST',
                    credentials: 'same-origin',
                    keepalive: true,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        is_standalone: standalone,
                        display_mode: displayMode,
                        user_agent: window.navigator.userAgent || '',
                        platform: window.navigator.platform || '',
                        path: window.location.pathname || ''
                    })
                }).catch(function () {});
            } catch (err) {}
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', reportClientContext, { once: true });
        } else {
            reportClientContext();
        }
    })();
</script>
{% endif %}
